html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #4ade80; letter-spacing: 2px; }
        #scoreboard {
            display: flex;
            gap: 40px;
            margin-bottom: 14px;
            font-size: 1.1rem;
        }
        #scoreboard span { color: #a0a0b0; }
        #scoreboard strong { color: white; }
        canvas {
            border: 3px solid #4ade80;
            border-radius: 6px;
            background: #0f0f1a;
            display: block;
        }
        #message {
            margin-top: 16px;
            font-size: 1rem;
            color: #a0a0b0;
            height: 24px;
        }
        #message.active { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>
    <span>
            <a href="index.html" id="top">Home</a> |
            <a href="resume.html">Resume</a> |
            <a href="basketball.html">Basketball</a> |
            <a href="#">Game</a>  
        </span> 
    <h1>SNAKE</h1>
    <div id="scoreboard">
        <div><span>Score: </span><strong id="score">0</strong></div>
        <div><span>High Score: </span><strong id="highScore">0</strong></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="message">Press any arrow key to start</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake, dir, nextDir, food, score, highScore, gameLoop, started, dead;

        function init() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            started = false;
            dead = false;
            highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
            highScoreEl.textContent = highScore;
            scoreEl.textContent = 0;
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            draw();
            messageEl.textContent = 'Press any arrow key to start';
            messageEl.classList.remove('active');
        }

        function spawnFood() {
            let pos;
            do {
                pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function start() {
            started = true;
            messageEl.textContent = '';
            gameLoop = setInterval(update, 120);
        }

        function update() {
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                clearInterval(gameLoop);
                dead = true;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHigh', highScore);
                    highScoreEl.textContent = highScore;
                }
                messageEl.textContent = 'Game Over! Press R to restart';
                messageEl.classList.add('active');
                draw();
                return;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#1a1a30';
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    ctx.fillRect(x * GRID + 9, y * GRID + 9, 2, 2);
                }
            }

            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((seg, i) => {
                const ratio = 1 - (i / snake.length) * 0.5;
                ctx.fillStyle = dead ? '#555' : `rgba(74, 222, 128, ${ratio})`;
                const pad = i === 0 ? 1 : 2;
                ctx.beginPath();
                ctx.roundRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2, 4);
                ctx.fill();
            });

            if (!dead) {
                const hx = snake[0].x * GRID;
                const hy = snake[0].y * GRID;
                ctx.fillStyle = '#0f0f1a';
                const ex = dir.x === -1 ? 6 : dir.x === 1 ? 13 : null;
                const ey = dir.y === -1 ? 6 : dir.y === 1 ? 13 : null;
                let e1, e2;
                if (dir.x !== 0) { e1 = { x: hx + ex, y: hy + 5 }; e2 = { x: hx + ex, y: hy + 13 }; }
                else { e1 = { x: hx + 5, y: hy + ey }; e2 = { x: hx + 13, y: hy + ey }; }
                [e1, e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 2, 0, Math.PI * 2); ctx.fill(); });
            }
        }

        document.addEventListener('keydown', e => {
            const keys = {
                ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
                ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 }
            };
            if (e.key === 'r' || e.key === 'R') { init(); return; }
            if (!keys[e.key]) return;
            e.preventDefault();
            const d = keys[e.key];
            if (d.x === -dir.x && d.y === -dir.y) return;
            nextDir = d;
            if (!started) start();
        });

        init();
    </script>
</body>
</html>
